name: Infinite Buy - Market Close

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 07:00 KST (22:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync-executions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: infinite-buy
        run: |
          echo "::group::npm install"
          npm install
          echo "::endgroup::"

      - name: Sync executions
        id: run
        working-directory: infinite-buy
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "▶ Starting main-close.ts at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          npx tsx src/main-close.ts 2>&1 | tee /tmp/close-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "▶ Finished with exit code: $EXIT_CODE"
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Commit state changes
        run: |
          echo "▶ Preparing git commit..."
          git config user.name "infinite-buy-bot"
          git config user.email "bot@infinite-buy.local"
          git add infinite-buy/state/ infinite-buy/logs/ infinite-buy/history/ infinite-buy/config.json
          if git diff --staged --quiet; then
            echo "▶ No changes to commit"
          else
            echo "▶ Committing state changes..."
            git commit -m "infinite-buy: close sync $(date -u +%Y-%m-%d)"
            echo "▶ Pulling with rebase..."
            git pull --rebase
            echo "▶ Pushing..."
            git push
            echo "▶ Push complete"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Infinite Buy — Market Close" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date (UTC):** $(date -u '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Exit Code:** ${{ steps.run.outputs.exit_code || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/close-output.log ]; then
            echo "<details><summary>Script Output</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/close-output.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
